name: 全栈自动化测试

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: 后端单元测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven
      - run: mvn test --no-transfer-progress
        working-directory: ShoppingApp/backed

  frontend-tests:
    name: 前端组件测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ShoppingApp/appfront
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ShoppingApp/appfront/package-lock.json
      - run: npm ci
      - run: npx vitest run

  e2e-api-tests:
    name: E2E API 测试
    needs: [backend-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ShoppingApp/appfront
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ShoppingApp/appfront/package-lock.json
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Start backend
        run: |
          mvn spring-boot:run -Dspring-boot.run.profiles=test &
          npx wait-on http://localhost:8080/api/hotels --timeout 60000
        working-directory: ShoppingApp/backed
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_JPA_HIBERNATE_DDL_AUTO: create
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      - name: Run E2E API tests
        run: npx playwright test --project=api
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: ShoppingApp/appfront/playwright-report/
